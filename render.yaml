services:
  - type: web
    name: diet-backend
    env: python
    plan: free
    rootDir: FastAPI_Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ALLOWED_ORIGINS
        value: https://YOUR_VERCEL_DOMAIN
