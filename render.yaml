services:
  - type: web
    name: diet-backend
    env: python
    plan: free
    buildCommand: pip install -r FastAPI_Backend/requirements.txt
    startCommand: cd FastAPI_Backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://YOUR_VERCEL_DOMAIN
